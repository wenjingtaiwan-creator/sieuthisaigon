<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西貢超市 - 11x11 完整巨型圖板 (Telex + 完整音效版)</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #e8f5e9; 
    display: flex; flex-direction: column; align-items: center;
    padding: 10px; margin: 0; padding-bottom: 50px; overflow-x: hidden;
  }
  
  .scoreboard-container {
    display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px;
    width: 95%; max-width: 1100px; background: white; padding: 10px; 
    border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 15px;
  }
  .player-score {
    text-align: center; padding: 8px; border-radius: 8px; min-width: 14%; border: 2px solid transparent;
    opacity: 0.5; transition: 0.3s; flex-grow: 1; background-color: #eee;
  }
  .player-score.active-turn { opacity: 1; transform: scale(1.05); font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.15); background-color: #fff;}
  .player-score h4 { margin: 0 0 5px 0; font-size: 15px; }
  .player-score .money { font-size: 15px; color: #d84315; }

  .map-container {
    display: grid; grid-template-columns: repeat(11, 75px); grid-template-rows: repeat(11, 80px);
    gap: 4px; background-color: white; padding: 15px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); position: relative;
  }
  
  .map-center {
    grid-column: 2 / 11; grid-row: 2 / 11; 
    background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=800&q=80');
    background-size: cover; background-position: center; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; padding: 15px; position: relative;
  }
  .map-center::before { 
    content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(3px); z-index: 1; border-radius: 12px;
  }
  .dashboard-content { z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; }
  
  .center-control-bar {
    display: flex; justify-content: space-between; align-items: center; width: 100%; 
    margin-bottom: 15px; background: rgba(255,255,255,0.95); padding: 10px 20px; 
    border-radius: 12px; box-sizing: border-box; border: 2px solid #4caf50;
  }
  
  .dice-btn {
    display: flex; align-items: center; gap: 10px; background-color: #e64a19; color: white; 
    padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  }
  .dice-btn.magic-mode { background-color: #9c27b0; }
  .dice-visual { font-size: 38px; line-height: 1; }

  .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; overflow-y: auto; flex-grow: 1;}
  .player-board { background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border-top: 4px solid #ccc; display: flex; flex-direction: column; }
  .pb-cart { background: #fff8e1; border-radius: 6px; padding: 5px; margin-top: 5px; min-height: 30px; font-size: 20px; text-align: center; border: 1px dashed #ffb300; }

  .telex-guide {
    display: flex; justify-content: space-around; background: #fffde7; 
    border: 1px solid #fbc02d; border-radius: 8px; padding: 8px; margin-top: 10px;
  }
  .telex-section { flex: 1; text-align: left; }
  .telex-section h5 { margin: 0 0 5px 0; color: #f57f17; font-size: 12px; }
  .telex-item { font-family: monospace; font-size: 13px; margin-bottom: 2px; }
  .telex-char { color: #e91e63; font-weight: bold; }
  .telex-key { color: #1e88e5; font-weight: bold; }

  .map-tile {
    background-color: #f8f9fa; border: 2px solid #cfd8dc; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; padding: 2px;
  }
  .tile-emoji { font-size: 20px; }
  .tile-zh { font-size: 11px; font-weight: bold; }
  .tile-price { font-size: 9px; color: #d84315; font-weight: bold; }
  .corner-tile { background-color: #fff9c4; border-color: #fbc02d; }
  .chance-tile { background-color: #f3e5f5; border-color: #ce93d8; }
  
  .tokens-container { position: absolute; top: -25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; z-index: 20; width: 100%;}
  .player-wrapper { display: flex; flex-direction: column; align-items: center; animation: bounce 1s infinite alternate; }
  .name-tag { background: rgba(255,255,255,0.9); border: 1px solid #333; border-radius: 4px; font-size: 10px; padding: 1px 4px; font-weight: bold; }
  .player-token { font-size: 24px; filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.4)); }

  .card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
  .card { background-color: white; padding: 25px; border-radius: 15px; text-align: center; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;}
  input[type="text"] { width: 80%; padding: 12px; font-size: 22px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; text-align: center;}
  .btn-submit { background-color: #4caf50; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold;}
  .active-tile { border-color: #ff9800; background-color: #fff3e0; transform: scale(1.1); z-index: 10; border-width: 3px;}
  @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }
  .selectable-tile { animation: highlight 1.5s infinite; cursor: pointer; border-color: #9c27b0;}
</style>
</head>
<body>

<div class="scoreboard-container" id="scoreboard"></div>

<div class="map-container" id="map">
  <div class="map-center" id="centerDashboard"></div>
</div>

<div class="card-overlay" id="setupOverlay">
  <div class="card">
    <h3 style="color: #2e7d32;">🛒 西貢超市 - 玩家設定</h3>
    <div style="margin: 15px 0; text-align: left;">
       <label><b>選擇玩家人數 (1~6人):</b></label>
       <input type="number" id="playerCountInput" min="1" max="6" value="4" onchange="renderNameInputs()" style="width: 50px; padding: 5px;">

        <input type="text" id="userInput" placeholder="依照 Telex 規則輸入..." autocomplete="off">
        <br>
        <button class="btn-submit" onclick="checkTyping()">檢查拼字</button>
        <div class="telex-guide">
            <div class="telex-section">
                <h5>字母 (Letters)</h5>
                <div class="telex-item"><span class="telex-char">â</span>=<span class="telex-key">aa</span> <span class="telex-char">ă</span>=<span class="telex-key">aw</span></div>
                <div class="telex-item"><span class="telex-char">ê</span>=<span class="telex-key">ee</span> <span class="telex-char">ô</span>=<span class="telex-key">oo</span></div>
                <div class="telex-item"><span class="telex-char">ơ</span>=<span class="telex-key">ow</span> <span class="telex-char">ư</span>=<span class="telex-key">uw</span></div>
                <div class="telex-item"><span class="telex-char">đ</span>=<span class="telex-key">dd</span></div>
            </div>
            <div class="telex-section">
                <h5>聲調 (Tones)</h5>
                <div class="telex-item"><span class="telex-char">ˊ</span>=<span class="telex-key">s</span> <span class="telex-char">ˋ</span>=<span class="telex-key">f</span></div>
                <div class="telex-item"><span class="telex-char">ˀ</span>=<span class="telex-key">r</span> <span class="telex-char">~</span>=<span class="telex-key">x</span></div>
                <div class="telex-item"><span class="telex-char">.</span>=<span class="telex-key">j</span></div>
            </div>
        </div>
    </div>

    <div id="step2Area" style="display:none; padding:15px;">
        <div style="font-weight:bold; color:#03a9f4; margin-bottom:15px;">第二關：口說測試</div>
        <button class="btn-submit" style="background:#03a9f4; width:auto;" onclick="speakVietnamese()">🔊 聽發音</button>
        <button class="btn-submit" style="background:#e91e63; width:auto;" id="recordBtn" onclick="startSpeechRecognition()">🎤 測口說</button>
        <div id="speechResult" style="margin-top:10px;">點擊麥克風說話</div>
    </div>

    <div id="step3Area" style="display:none; padding:15px;">
        <div style="font-weight:bold; color:#e65100; margin-bottom:15px;">第三關：是否購買？</div>
        <div id="decisionMiniList" style="text-align:left; margin-bottom:15px; font-size:12px;"></div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button class="btn-submit" style="background:#ff9800; width:auto;" onclick="confirmPurchase()">🛒 購買</button>
          <button class="btn-submit" style="background:#9e9e9e; width:auto;" onclick="endTurn()">跳過</button>
        </div>
    </div>
    <div id="feedback" style="margin-top:10px; font-weight:bold;"></div>
  </div>
</div>

<div class="card-overlay" id="eventOverlay" style="display: none;">
  <div class="card" style="border: 4px solid #9c27b0;">
    <h3 id="eventTitle" style="color:#9c27b0;">❓ 突發事件</h3>
    <div id="eventEmoji" style="font-size:60px;">🃏</div>
    <div id="eventText" style="font-size:22px; font-weight:bold; margin:20px 0;"></div>
    <div id="eventAmount" style="font-size:28px; font-weight:bold;"></div>
    <button class="btn-submit" style="background:#9c27b0; margin-top:20px;" onclick="closeEventAndEndTurn()">確認</button>

</div>

    { zh: "洋蔥", vi: "hành tây", emoji: "🧅", cat: "veg", price: 20000, pos: {r:11, c:6} },
    { zh: "命運", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:11, c:5} },
    { zh: "蔥", vi: "hành lá", emoji: "🌿", cat: "veg", price: 10000, pos: {r:11, c:4} },

    { zh: "洗面乳", vi: "sữa rửa mặt", emoji: "🫧", cat: "daily", price: 90000, pos: {r:6, c:1} },
    { zh: "命運", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:5, c:1} },
    { zh: "衛生紙", vi: "khăn giấy", emoji: "🧻", cat: "daily", price: 30000, pos: {r:4, c:1} },
    { zh: "肥皂", vi: "xà bông", emoji: "🧼", cat: "daily", price: 20000, pos: {r:3, c:1} },
    { zh: "沐浴乳", vi: "sữa tắm", emoji: "🛁", cat: "daily", price: 100000, pos: {r:2, c:1} }
  ];

  const chances = [
    { text: "在超市亂跑被罰<br><small>chạy lung tung bị phạt</small>", amount: -100000 },
    { text: "幸運獲得購物金<br><small>nhận được tiền mua sắm</small>", amount: 150000 },
    { text: "捏壞水果被罰<br><small>bóp nát trái cây bị phạt</small>", amount: -50000 }
  ];

  function renderNameInputs() {
    let count = document.getElementById('playerCountInput').value;
    let html = "";
    for(let i=0; i<count; i++) html += `<div style="margin-bottom:5px;">${defaultAvatars[i]} <input type="text" id="pName_${i}" value="Player ${i+1}" style="width:150px; padding:5px;"></div>`;
    document.getElementById('nameInputsArea').innerHTML = html;
  }

  function requestMicAndStart() {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        window.globalMicStream = stream; startGame();
      }).catch(() => { alert("未授權麥克風，口說將跳過"); startGame(); });
    } else startGame();
  }

  function startGame() {
    let count = document.getElementById('playerCountInput').value;
    players = [];
    for(let i=0; i<count; i++) {
        players.push({
            id: i, name: document.getElementById(`pName_${i}`).value, color: defaultColors[i], emoji: defaultAvatars[i],
            money: 500000, pos: 0, list: generateList(), cart: [], active: true, magicDoor: false
        });
    }
    document.getElementById('setupOverlay').style.display = 'none';
    updateUI();
  }

  function generateList() {
    let pool = board.filter(it => it.price > 0);
    let list = [];
    while(list.length < 6) {
        let it = pool[Math.floor(Math.random()*pool.length)];
        if(!list.includes(it)) list.push(it);
    }
    return list;
  }

  function updateUI() {
    cp = players[currPlayerIdx];
    let sbHtml = "";
    players.forEach((p, idx) => sbHtml += `<div class="player-score ${idx===currPlayerIdx?'active-turn':''}" style="border-color:${p.color}"><h4>${p.emoji} ${p.name}</h4><div>${p.money.toLocaleString()} ₫</div></div>`);
    document.getElementById('scoreboard').innerHTML = sbHtml;

    let centerHtml = `<div class="dashboard-content">
        <div class="center-control-bar">
            <div style="color:${cp.color}; font-weight:bold;">${cp.name} 的回合</div>
            <div id="mainDiceBtn" class="dice-btn ${cp.magicDoor?'magic-mode':''}" onclick="triggerRoll()">
                <span class="dice-visual" id="diceVisual">${cp.magicDoor?'✨':'🎲'}</span>
                <span id="diceText">${cp.magicDoor?'傳送模式':'點擊擲骰'}</span>
            </div>
        </div>
        <div class="dashboard-grid">`;
    players.forEach(p => {
        centerHtml += `<div class="player-board" style="border-color:${p.color}">
            <div style="font-weight:bold; border-bottom:1px solid #ddd; padding-bottom:3px;">${p.name} 的狀態</div>
            <div style="font-size:11px; flex-grow:1; margin-top:5px;">${p.list.map(it => `<div class="${p.cart.includes(it)?'bought':''}" style="${p.cart.includes(it)?'text-decoration:line-through;color:#999':''}">${p.cart.includes(it)?'✅':'⬜'} ${it.zh} (${it.vi})</div>`).join('')}</div>
            <div class="pb-cart">${p.cart.length > 0 ? p.cart.map(i=>i.emoji).join('') : '<span style="font-size:12px;color:#ccc">購物車空空</span>'}</div>
        </div>`;
    });
    centerHtml += `</div></div>`;
    document.getElementById('centerDashboard').innerHTML = centerHtml;
    renderMap();
  }

  function renderMap() {
    const mapDiv = document.getElementById('map');
    const existingCenter = document.getElementById('centerDashboard');
    mapDiv.innerHTML = ''; mapDiv.appendChild(existingCenter);
    board.forEach((it, i) => {
        let tile = document.createElement('div');
        tile.className = "map-tile " + (it.cat==='corner'?'corner-tile':'') + (it.cat==='chance'?'chance-tile':'') + (isChoosingMagicDest?'selectable-tile':'');
        if(i === cp.pos) tile.classList.add('active-tile');
        tile.style.gridRow = it.pos.r; tile.style.gridColumn = it.pos.c;
        tile.innerHTML = `<div class="tile-emoji">${it.emoji}</div><div class="tile-zh">${it.zh}</div><div class="tile-price">${it.price>0?it.price.toLocaleString():''}</div>`;
        let playersHere = players.filter(p => p.pos === i && p.active);
        if (playersHere.length > 0) {
            let tokens = playersHere.map(p => `<div class="player-wrapper"><div class="name-tag" style="color:${p.color}">${p.name}</div><div class="player-token">${p.emoji}</div></div>`).join('');
            tile.innerHTML = `<div class="tokens-container">${tokens}</div>` + tile.innerHTML;
        }
        tile.onclick = () => { if(isChoosingMagicDest) { cp.pos = i; cp.magicDoor = false; isChoosingMagicDest = false; triggerTask(i); } };
        mapDiv.appendChild(tile);
    });
  }

  function triggerRoll() {
    if (isRolling || cp.magicDoor) {
        if(cp.magicDoor) { isChoosingMagicDest = true; renderMap(); }
        return;
    }
    isRolling = true;
    let steps = Math.floor(Math.random() * 6) + 1;
    let rollFrames = 0;
    let anim = setInterval(() => {
        document.getElementById('diceVisual').innerText = diceFaces[Math.floor(Math.random()*6)];
        if (rollFrames++ > 10) { clearInterval(anim); document.getElementById('diceVisual').innerText = diceFaces[steps-1]; setTimeout(() => executeMove(steps), 400); }
    }, 60);
  }

  function executeMove(steps) {
    let count = 0, passedStart = false;
    let itv = setInterval(() => {
        cp.pos = (cp.pos + 1) % board.length;
        sfxMove.play();
        if(cp.pos === 0) passedStart = true;
        renderMap();
        if(++count >= steps) { 
            clearInterval(itv); isRolling = false;
            if(passedStart && cp.pos !== 0) { cp.money += 20000; sfxGoodLuck.play(); updateUI(); alert("🎟️ 經過門口，領取 20,000 ₫ 優惠券！"); }
            triggerTask(cp.pos); 
        }
    }, 300);
  }

  function triggerTask(idx) {
    currentItemObj = board[idx];
    if (currentItemObj.cat === 'corner') {
        if (idx === 0) { cp.money += 20000; sfxGoodLuck.play(); showEvent("超市門口", "🎟️", "領取 20,000 ₫ 優惠券！", 20000, "#fbc02d"); return; }
        cp.magicDoor = true; sfxGoodLuck.play(); showEvent("神奇的門", "🚪", "下一回合可以任意傳送！", 0, "#9c27b0"); return;
    }
    if (currentItemObj.cat === 'chance') {
        const ev = chances[Math.floor(Math.random()*chances.length)];
        cp.money += ev.amount; if(ev.amount > 0) sfxGoodLuck.play(); else sfxBadLuck.play();
        showEvent("命運機會", "🃏", ev.text, ev.amount, "#9c27b0"); return;
    }
    if (currentItemObj.price === 0) { endTurn(); return; }
    
    document.getElementById('locationName').innerText = "📍 " + currentItemObj.zh;
    document.getElementById('emojiDisplay').innerText = currentItemObj.emoji;
    document.getElementById('viTargetDisplay').innerText = currentItemObj.vi;
    document.getElementById('taskOverlay').style.display = "flex";
    document.getElementById('step1Area').style.display = "block";
    document.getElementById('step2Area').style.display = "none";
    document.getElementById('step3Area').style.display = "none";
    document.getElementById('userInput').value = ""; document.getElementById('feedback').innerText = "";
    document.getElementById('userInput').focus();
  }

  function checkTyping() {
    if (document.getElementById('userInput').value.trim().toLowerCase() === currentItemObj.vi.toLowerCase()) {
        sfxCorrect.play(); document.getElementById('step1Area').style.display = "none"; document.getElementById('step2Area').style.display = "block";
    } else { sfxWrong.play(); document.getElementById('feedback').innerText = "❌ 拼寫不對喔！"; document.getElementById('feedback').style.color = "red"; }
  }

  function speakVietnamese() { new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(currentItemObj.vi)}`).play(); }

  function startSpeechRecognition() {
    if (!recognition) { successSpeech(); return; }
    recognition.start();
    document.getElementById('recordBtn').innerText = "🎙️ 聆聽中...";
    recognition.onresult = (e) => {
        if(e.results[0][0].transcript.toLowerCase().includes(currentItemObj.vi)) { sfxCorrect.play(); successSpeech(); }
        else { sfxWrong.play(); document.getElementById('feedback').innerText = "❌ 再試一次！"; }
    };
    recognition.onend = () => document.getElementById('recordBtn').innerText = "🎤 2. 測口說";
  }

  function successSpeech() { 
    document.getElementById('step2Area').style.display = "none"; 
    document.getElementById('step3Area').style.display = "block"; 
    document.getElementById('decisionMiniList').innerHTML = players[currPlayerIdx].list.map(it => `<div style="${players[currPlayerIdx].cart.includes(it)?'color:#ccc':''}">${players[currPlayerIdx].cart.includes(it)?'✅':'⬜'} ${it.zh}</div>`).join('');
  }

  function confirmPurchase() {
      cp.money -= currentItemObj.price; cp.cart.push(currentItemObj);
      if(cp.list.includes(currentItemObj)) { sfxWow.currentTime = 0; sfxWow.play(); setTimeout(()=>sfxWow.pause(),1000); }
      endTurn();
  }

  function showEvent(title, emoji, text, amount, color) {
    document.getElementById('eventTitle').innerText = title; document.getElementById('eventEmoji').innerText = emoji;
    document.getElementById('eventText').innerHTML = text;
    document.getElementById('eventAmount').innerText = amount !== 0 ? (amount > 0 ? "+" : "") + amount.toLocaleString() + " ₫" : "";
    document.getElementById('eventAmount').style.color = amount >= 0 ? "#4caf50" : "#f44336";
    document.getElementById('eventOverlay').style.display = "flex"; updateUI();
  }

  function closeEventAndEndTurn() { document.getElementById('eventOverlay').style.display = "none"; endTurn(); }

  function endTurn() {
    document.getElementById('taskOverlay').style.display = "none";
    if(cp.list.length > 0 && cp.list.every(it => cp.cart.includes(it))) { triggerVictory(); return; }
    currPlayerIdx = (currPlayerIdx + 1) % players.length;
    updateUI();
  }

  function triggerVictory() {
    sfxGoodLuck.play(); alert(`🏆 恭喜 ${cp.name} 獲勝！`); location.reload();
  }

  const defaultColors = ["#e53935", "#1e88e5", "#43a047", "#fdd835", "#8e24aa", "#ff9800"];
  const defaultAvatars = ["👦", "👧", "👨", "👩", "👱‍♂️", "👱‍♀️"];
  window.onload = renderNameInputs;
</script>
</body>
</html>
