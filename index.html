<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西貢超市 - 教學實境對話版</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #e8f5e9; 
    display: flex; flex-direction: column; align-items: center;
    padding: 10px; margin: 0; padding-bottom: 50px; overflow-x: hidden;
  }
  
  .scoreboard-container {
    display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px;
    width: 95%; max-width: 1100px; background: white; padding: 10px; 
    border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 15px;
  }
  .player-score {
    text-align: center; padding: 8px; border-radius: 8px; min-width: 14%; border: 2px solid transparent;
    opacity: 0.5; transition: 0.3s; flex-grow: 1; background-color: #eee;
  }
  .player-score.active-turn { opacity: 1; transform: scale(1.05); font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.15); background-color: #fff;}
  .player-score h4 { margin: 0 0 5px 0; font-size: 15px; }
  .player-score .money { font-size: 15px; color: #d84315; }

  .map-container {
    display: grid; grid-template-columns: repeat(11, 75px); grid-template-rows: repeat(11, 80px);
    gap: 4px; background-color: white; padding: 15px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); position: relative;
  }
  
  .map-center {
    grid-column: 2 / 11; grid-row: 2 / 11; 
    background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=800&q=80');
    background-size: cover; background-position: center; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; padding: 15px; position: relative;
  }
  .map-center::before { 
    content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(2px); z-index: 1; border-radius: 12px;
  }
  .dashboard-content { z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; }
  
  .center-control-bar {
    display: flex; justify-content: space-between; align-items: center; width: 100%; 
    margin-bottom: 15px; background: rgba(255,255,255,0.95); padding: 10px 20px; 
    border-radius: 12px; box-sizing: border-box; border: 2px solid #4caf50;
  }
  
  .dice-btn {
    display: flex; align-items: center; gap: 10px; background-color: #e64a19; color: white; 
    padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  }
  .dice-btn.magic-mode { background-color: #9c27b0; }
  .dice-visual { font-size: 38px; line-height: 1; }

  .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; overflow-y: auto; flex-grow: 1;}
  .player-board { background: rgba(255,255,255,0.95); border-radius: 8px; padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border-top: 4px solid #ccc; display: flex; flex-direction: column; }
  .pb-list { font-size: 11px; margin-top: 5px; flex-grow: 1; line-height: 1.4; }
  .pb-cart { background: #fff8e1; border-radius: 6px; padding: 5px; margin-top: 5px; min-height: 25px; font-size: 18px; text-align: center; border: 1px dashed #ffb300; }

  .telex-guide { display: flex; justify-content: space-around; background: #fffde7; border: 1px solid #fbc02d; border-radius: 8px; padding: 8px; margin-top: 10px; }
  .telex-section { flex: 1; text-align: left; }
  .telex-section h5 { margin: 0 0 5px 0; color: #f57f17; font-size: 12px; }
  .telex-item { font-family: monospace; font-size: 12px; margin-bottom: 2px; }
  .telex-char { color: #e91e63; font-weight: bold; }

  .map-tile { background-color: #f8f9fa; border: 2px solid #cfd8dc; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 2px; }
  .tile-emoji { font-size: 20px; }
  .tile-zh { font-size: 11px; font-weight: bold; }
  .tile-price { font-size: 9px; color: #d84315; font-weight: bold; }
  .corner-tile { background-color: #fff9c4; border-color: #fbc02d; }
  .chance-tile { background-color: #f3e5f5; border-color: #ce93d8; }
  
  .tokens-container { position: absolute; top: -25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; z-index: 20; width: 100%;}
  .player-wrapper { display: flex; flex-direction: column; align-items: center; animation: bounce 1s infinite alternate; }
  .name-tag { background: rgba(255,255,255,0.9); border: 1px solid #333; border-radius: 4px; font-size: 10px; padding: 1px 4px; font-weight: bold; }
  .player-token { font-size: 24px; filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.4)); }

  .card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
  .card { background-color: white; padding: 20px; border-radius: 15px; text-align: center; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;}
  input[type="text"] { width: 80%; padding: 12px; font-size: 20px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; text-align: center;}
  
  .chat-box { background: #f9f9f9; border-radius: 10px; padding: 15px; margin: 10px 0; text-align: left; }
  .chat-bubble { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; font-size: 16px; line-height: 1.4; }
  .clerk { background: #e3f2fd; border-left: 5px solid #1976d2; margin-right: 15%; }
  .player-chat { background: #f1f8e9; border-right: 5px solid #4caf50; margin-left: 15%; text-align: right;}

  .btn-submit { background-color: #4caf50; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px;}
  .num-btn { background: #fff; border: 2px solid #4caf50; color: #4caf50; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .num-btn.active { background: #4caf50; color: white; }

  @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }
</style>
</head>
<body>

<div class="scoreboard-container" id="scoreboard"></div>

<div class="map-container" id="map">
  <div class="map-center" id="centerDashboard"></div>
</div>

<div class="card-overlay" id="setupOverlay">
  <div class="card">
    <h2 style="color: #2e7d32; margin-top: 0;">🛒 西貢超市 - 開學大採購</h2>
    <p><b>1. 選擇玩家人數</b></p>
    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;" id="numSelector">
      <button class="num-btn" onclick="selectPlayerCount(1)">1</button>
      <button class="num-btn" onclick="selectPlayerCount(2)">2</button>
      <button class="num-btn" onclick="selectPlayerCount(3)">3</button>
      <button class="num-btn active" onclick="selectPlayerCount(4)">4</button>
      <button class="num-btn" onclick="selectPlayerCount(5)">5</button>
      <button class="num-btn" onclick="selectPlayerCount(6)">6</button>
    </div>
    <div id="nameInputsArea" style="margin-bottom: 15px;"></div>
    <button class="btn-submit" onclick="requestMicAndStart()" style="padding: 15px 40px; font-size: 20px;">開始遊戲</button>
  </div>
</div>

<div class="card-overlay" id="taskOverlay" style="display: none;">
  <div class="card">
    <h3 id="locationName" style="margin: 0;">📍 商品名稱</h3>
    <div id="emojiDisplay" style="font-size: 60px;">🛒</div>
    
    <div id="step1Area">
        <div id="viTargetDisplay" style="font-size: 28px; color: #1976d2; font-weight: bold; background: #f5f5f5; padding: 10px; border-radius: 8px; margin: 10px 0;">vi_word</div>
        <div style="font-weight: bold; margin-bottom: 10px; color: #555;">第一關：拼寫練習</div>
        <input type="text" id="userInput" placeholder="輸入 Telex 拼寫..." autocomplete="off">
        <br>
        <button class="btn-submit" onclick="checkTyping()">檢查拼字</button>
        <div class="telex-guide">
            <div class="telex-section"><h5>字母</h5><div class="telex-item">â=aa ă=aw ê=ee ô=oo ơ=ow ư=uw</div></div>
            <div class="telex-section"><h5>聲調</h5><div class="telex-item">ˊ=s ˋ=f ˀ=r ~=x .=j</div></div>
        </div>
    </div>

    <div id="step2Area" style="display:none; padding:15px;">
        <div style="font-weight:bold; color:#03a9f4; margin-bottom:15px;">第二關：單字發音練習</div>
        <div style="display: flex; justify-content: center; gap: 10px;">
          <button class="btn-submit" style="background:#03a9f4;" onclick="speakVietnamese()">🔊 聽範音</button>
          <button class="btn-submit" style="background:#e91e63;" id="wordRecordBtn" onclick="startWordSpeech()">🎤 測發音</button>
        </div>
        <div id="wordFeedback" style="margin-top:10px; font-weight:bold;"></div>
        <button id="giveupWordBtn" class="btn-submit" style="background:#757575; display:none; font-size:12px;" onclick="giveUpToDecision()">🏳️ 發音太難了 (扣 10,000 ₫ 跳過)</button>
    </div>

    <div id="step3Area" style="display:none; padding:10px;">
        <div style="font-weight:bold; color:#e65100; margin-bottom:10px;">第三關：決定購買？</div>
        <div id="decisionMiniList" style="background:#fff9c4; border-radius:8px; padding:10px; margin-bottom:15px; border:1px solid #fbc02d; text-align:left;"></div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button class="btn-submit" style="background:#ff9800;" onclick="startDialogueFlow()">🛒 確定購買</button>
          <button class="btn-submit" style="background:#9e9e9e;" onclick="endTurn()">不買了</button>
        </div>
    </div>

    <div id="step4Area" style="display:none;">
        <div style="font-weight:bold; color:#1976d2; margin-bottom:10px;">🛒 超市櫃檯會話</div>
        <div class="chat-box" id="chatBox">
            <div class="chat-bubble clerk" id="clerkBubble">Xin chào! Bạn muốn mua gì?</div>
            <div class="chat-bubble player-chat" id="playerBubble" style="display:none;">...</div>
        </div>
        <div style="font-size: 14px; background: #fffde7; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            請說：<br><b id="targetSentence" style="color:#d81b60; font-size:18px;">正在加載...</b>
        </div>
        <button class="btn-submit" style="background:#e91e63; width:80%;" id="dialogueRecordBtn" onclick="processDialogue()">🎤 點擊開始對話</button>
        <button id="giveupBtn" class="btn-submit" style="background:#757575; display:none; font-size:12px;" onclick="giveUpToFinalize()">🏳️ 對話太難了 (扣 10,000 ₫ 跳過)</button>
    </div>
  </div>
</div>

<div class="card-overlay" id="eventOverlay" style="display: none;">
  <div class="card" style="border: 4px solid #9c27b0;">
    <h3 id="eventTitle" style="color:#9c27b0;">❓ 命運機會</h3>
    <div id="eventEmoji" style="font-size:60px;">🃏</div>
    <div id="eventText" style="font-size:22px; font-weight:bold; margin:15px 0; line-height:1.5;"></div>
    <div id="eventAmount" style="font-size:28px; font-weight:bold;"></div>
    <button class="btn-submit" style="background:#9c27b0; margin-top:20px;" onclick="closeEventAndEndTurn()">確認並繼續</button>
  </div>
</div>

  const sfxBadLuck = new Audio('https://assets.mixkit.co/active_storage/sfx/2954/2954-preview.mp3');

  const bgm = new Audio('https://www.chosic.com/wp-content/uploads/2021/04/My-Full-Moon-Piano-Music.mp3');
  bgm.loop = true; bgm.volume = 0.15;

  let players = [], currPlayerIdx = 0, cp, isRolling = false, isChoosingMagicDest = false;
  let selectedCount = 4;
  let wordSpeechFailCount = 0;
  let dialogueFailCount = 0;
  let dialogueStep = 0; 
  const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

  const chances = [
    { text: "在超市亂跑被罰<br><small>chạy lung tung bị phạt</small>", amount: -100000 },
    { text: "幸運獲得購物金<br><small>nhận được tiền mua sắm</small>", amount: 150000 },
    { text: "捏壞水果被罰<br><small>bóp nát trái cây bị phạt</small>", amount: -50000 },
    { text: "幫忙打掃超市獲得獎勵<br><small>giúp dọn dẹp siêu thị</small>", amount: 100000 }
  ];

  const board = [
    { zh: "超市門口", vi: "cửa ra vào", emoji: "🛒", cat: "corner", price: 0, pos: {r:1, c:1} },
    { zh: "紅毛丹", vi: "chôm chôm", emoji: "🍒", cat: "fruit", price: 40000, pos: {r:1, c:2} },
    { zh: "命運格", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:1, c:3} },
    { zh: "波羅蜜", vi: "mít", emoji: "🍈", cat: "fruit", price: 30000, pos: {r:1, c:4} },
    { zh: "橘子", vi: "cam", emoji: "🍊", cat: "fruit", price: 25000, pos: {r:1, c:5} },
    { zh: "香蕉", vi: "chuối", emoji: "🍌", cat: "fruit", price: 20000, pos: {r:1, c:6} },
    { zh: "命運格", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:1, c:7} },
    { zh: "芒果", vi: "xoài", emoji: "🥭", cat: "fruit", price: 35000, pos: {r:1, c:8} },
    { zh: "榴槤", vi: "sầu riêng", emoji: "🍍", cat: "fruit", price: 150000, pos: {r:1, c:9} },
    { zh: "芭樂", vi: "ổi", emoji: "🍐", cat: "fruit", price: 15000, pos: {r:1, c:10} },
    { zh: "神奇門", vi: "cửa thần kỳ", emoji: "🚪", cat: "corner", price: 0, pos: {r:1, c:11} },
    { zh: "豬肉", vi: "thịt heo", emoji: "🥩", cat: "meat", price: 100000, pos: {r:2, c:11} },
    { zh: "雞肉", vi: "thịt gà", emoji: "🍗", cat: "meat", price: 80000, pos: {r:3, c:11} },
    { zh: "命運格", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:4, c:11} },
    { zh: "牛肉", vi: "thịt bò", emoji: "🥩", cat: "meat", price: 200000, pos: {r:5, c:11} },
    { zh: "魚", vi: "cá", emoji: "🐟", cat: "meat", price: 70000, pos: {r:6, c:11} },
    { zh: "命運格", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:7, c:11} },
    { zh: "蝦子", vi: "tôm", emoji: "🦐", cat: "meat", price: 150000, pos: {r:8, c:11} },
    { zh: "扎肉", vi: "chả lụa", emoji: "🍖", cat: "meat", price: 120000, pos: {r:9, c:11} },
    { zh: "香腸", vi: "xúc xích", emoji: "🌭", cat: "meat", price: 50000, pos: {r:10, c:11} },

    { zh: "胡蘿蔔", vi: "cà rốt", emoji: "🥕", cat: "veg", price: 20000, pos: {r:11, c:10} },
    { zh: "番茄", vi: "cà chua", emoji: "🍅", cat: "veg", price: 25000, pos: {r:11, c:9} },
    { zh: "命運格", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:11, c:8} },
    { zh: "小黃瓜", vi: "dưa leo", emoji: "🥒", cat: "veg", price: 15000, pos: {r:11, c:7} },
    { zh: "洋蔥", vi: "hành tây", emoji: "🧅", cat: "veg", price: 20000, pos: {r:11, c:6} },
    { zh: "命運格", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:11, c:5} },

    { zh: "牙刷", vi: "bàn chải", emoji: "🪥", cat: "daily", price: 20000, pos: {r:9, c:1} },
    { zh: "命運格", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:8, c:1} },

    { zh: "命運格", vi: "", emoji: "❓", cat: "chance", price: 0, pos: {r:5, c:1} },

    { zh: "沐浴乳", vi: "sữa tắm", emoji: "🛁", cat: "daily", price: 100000, pos: {r:2, c:1} }
  ];

  function selectPlayerCount(n) {
    selectedCount = n;
    let btns = document.querySelectorAll('.num-btn');
    btns.forEach(b => b.classList.remove('active'));
    btns[n-1].classList.add('active');
    bgm.play().catch(() => {});
    renderNameInputs();
  }

  function renderNameInputs() {
    let html = "";
    for(let i=0; i<selectedCount; i++) html += `<div style="margin-bottom:8px;">👤 <input type="text" id="pName_${i}" value="玩家 ${i+1}" style="width:180px; font-size:14px; padding:5px;"></div>`;
    document.getElementById('nameInputsArea').innerHTML = html;
  }

  function requestMicAndStart() {
    bgm.play().catch(() => {});
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(() => startGame()).catch(() => startGame());
    } else startGame();
  }

  function startGame() {
    players = [];
    for(let i=0; i<selectedCount; i++) {
        players.push({
            id: i, name: document.getElementById(`pName_${i}`).value, color: defaultColors[i], emoji: defaultAvatars[i],
            money: 500000, pos: 0, list: generateList(), cart: [], active: true, magicDoor: false
        });
    }
    document.getElementById('setupOverlay').style.display = 'none';
    updateUI();
  }

  function generateList() {
    let pool = board.filter(it => it.price > 0);
    let list = [];
    while(list.length < 6) {
        let it = pool[Math.floor(Math.random()*pool.length)];
        if(!list.includes(it)) list.push(it);
    }
    return list;
  }

  function updateUI() {
    cp = players[currPlayerIdx];
    let sbHtml = "";
    players.forEach((p, idx) => sbHtml += `<div class="player-score ${idx===currPlayerIdx?'active-turn':''}" style="border-color:${p.color}"><h4>${p.emoji} ${p.name}</h4><div>${p.money.toLocaleString()} ₫</div></div>`);
    document.getElementById('scoreboard').innerHTML = sbHtml;

    let centerHtml = `<div class="dashboard-content">
        <div class="center-control-bar">
            <div style="color:${cp.color}; font-weight:bold;">${cp.emoji} ${cp.name} 的回合</div>
            <div class="dice-btn ${cp.magicDoor?'magic-mode':''}" onclick="triggerRoll()">
                <span class="dice-visual" id="diceVisual">${cp.magicDoor?'✨':'🎲'}</span>
                <span>${cp.magicDoor?'傳送模式':'點擊擲骰'}</span>
            </div>
        </div>
        <div class="dashboard-grid">`;
    players.forEach(p => {
        centerHtml += `<div class="player-board" style="border-color:${p.color}">
            <div style="font-weight:bold; font-size:12px; border-bottom:1px solid #ddd;">${p.name} 的清單</div>
            <div class="pb-list">${p.list.map(it => `<div>${p.cart.includes(it)?'✅':'⬜'} ${it.zh} <span style="color:#666; font-size:10px;">(${it.vi})</span></div>`).join('')}</div>
            <div class="pb-cart">${p.cart.map(i=>i.emoji).join('')}</div>
        </div>`;
    });
    centerHtml += `</div></div>`;
    document.getElementById('centerDashboard').innerHTML = centerHtml;
    renderMap();
  }

  function renderMap() {
    const mapDiv = document.getElementById('map');
    const existingCenter = document.getElementById('centerDashboard');
    mapDiv.innerHTML = ''; mapDiv.appendChild(existingCenter);
    board.forEach((it, i) => {
        let tile = document.createElement('div');
        tile.className = "map-tile " + (it.cat==='corner'?'corner-tile':'') + (it.cat==='chance'?'chance-tile':'') + (isChoosingMagicDest?'selectable-tile':'');
        if(i === cp.pos) tile.classList.add('active-tile');
        tile.style.gridRow = it.pos.r; tile.style.gridColumn = it.pos.c;
        tile.innerHTML = `<div class="tile-emoji">${it.emoji}</div><div class="tile-zh">${it.zh}</div><div class="tile-price">${it.price>0?it.price.toLocaleString():''}</div>`;
        let playersHere = players.filter(p => p.pos === i);
        if (playersHere.length > 0) {
            let tokens = playersHere.map(p => `<div class="player-wrapper"><div class="name-tag" style="color:${p.color}">${p.name}</div><div class="player-token">${p.emoji}</div></div>`).join('');
            tile.innerHTML = `<div class="tokens-container">${tokens}</div>` + tile.innerHTML;
        }
        tile.onclick = () => { if(isChoosingMagicDest) { cp.pos = i; cp.magicDoor = false; isChoosingMagicDest = false; triggerTask(i); } };
        mapDiv.appendChild(tile);
    });
  }

  function triggerRoll() {
    if (isRolling || cp.magicDoor) {
        if(cp.magicDoor) { isChoosingMagicDest = true; renderMap(); }
        return;
    }
    isRolling = true; sfxDice.play();
    let steps = Math.floor(Math.random() * 6) + 1;
    let rollFrames = 0;
    let anim = setInterval(() => {
        document.getElementById('diceVisual').innerText = diceFaces[Math.floor(Math.random()*6)];
        if (rollFrames++ > 10) { clearInterval(anim); document.getElementById('diceVisual').innerText = diceFaces[steps-1]; setTimeout(() => executeMove(steps), 400); }
    }, 60);
  }

  function executeMove(steps) {
    let count = 0, passedStart = false;
    let itv = setInterval(() => {
        cp.pos = (cp.pos + 1) % board.length;
        sfxMove.play();
        if (cp.pos === 0) passedStart = true;
        renderMap();
        if (++count >= steps) { 
            clearInterval(itv); isRolling = false;
            if (passedStart && cp.pos !== 0) {
                cp.money += 20000; sfxGoodLuck.play(); updateUI(); alert("🎟️ 經過超市門口，獲得 20,000 ₫ 購物金！");
            }
            triggerTask(cp.pos); 
        }
    }, 300);
  }

  function triggerTask(idx) {
    currentItemObj = board[idx];
    wordSpeechFailCount = 0;
    dialogueFailCount = 0;
    
    if (idx === 0) {
        cp.money += 20000; sfxGoodLuck.play(); updateUI(); alert("🎁 抵達超市門口，領取 20,000 ₫ 購物金！");
        endTurn(); return;
    }

    if (currentItemObj.cat === 'chance') {
        const ev = chances[Math.floor(Math.random() * chances.length)];
        cp.money += ev.amount;
        if (ev.amount >= 0) sfxGoodLuck.play(); else sfxBadLuck.play();
        showChanceEvent(ev); return;
    }

    if (currentItemObj.cat === 'corner') { cp.magicDoor = true; updateUI(); alert("神奇門！下回任行。"); endTurn(); return; }
    if (currentItemObj.price === 0) { endTurn(); return; }
    
    document.getElementById('locationName').innerText = "📍 " + currentItemObj.zh;
    document.getElementById('viTargetDisplay').innerText = currentItemObj.vi;
    document.getElementById('emojiDisplay').innerText = currentItemObj.emoji;
    document.getElementById('taskOverlay').style.display = "flex";
    
    // 重置關卡順序
    document.getElementById('step1Area').style.display = "block";
    document.getElementById('step2Area').style.display = "none";
    document.getElementById('step3Area').style.display = "none";
    document.getElementById('step4Area').style.display = "none";
    document.getElementById('userInput').value = "";
    document.getElementById('giveupWordBtn').style.display = "none";
    document.getElementById('giveupBtn').style.display = "none";
  }

  function showChanceEvent(ev) {
    document.getElementById('eventText').innerHTML = ev.text;
    const am = document.getElementById('eventAmount');
    if(ev.amount !== 0) { am.innerText = (ev.amount > 0 ? "+" : "") + ev.amount.toLocaleString() + " ₫"; am.style.color = ev.amount > 0 ? "#4caf50" : "#f44336"; }
    else am.innerText = "";
    document.getElementById('eventOverlay').style.display = "flex";
  }

  function closeEventAndEndTurn() { document.getElementById('eventOverlay').style.display = "none"; endTurn(); }

  // --- 第一關：打字 ---
  function checkTyping() {
    if (document.getElementById('userInput').value.trim().toLowerCase() === currentItemObj.vi.toLowerCase()) {
        sfxCorrect.play(); document.getElementById('step1Area').style.display = "none"; document.getElementById('step2Area').style.display = "block";
    } else { sfxWrong.play(); alert("拼寫不對喔！"); }
  }

  // --- 第二關：測口說單字 ---
  function speakVietnamese() { new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(currentItemObj.vi)}`).play(); }
  
  function startWordSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let rec = new SpeechRecognition(); rec.lang = 'vi-VN';
      rec.start(); document.getElementById('wordRecordBtn').innerText = "🎧 聆聽中...";
      rec.onresult = (e) => {
          if(e.results[0][0].transcript.toLowerCase().includes(currentItemObj.vi.toLowerCase())) {
              sfxCorrect.play(); 
              document.getElementById('step2Area').style.display = "none";
              showDecisionStep();
          } else { 
              sfxWrong.play(); wordSpeechFailCount++;
              if(wordSpeechFailCount >= 3) document.getElementById('giveupWordBtn').style.display = "inline-block";
          }
      };
      rec.onend = () => document.getElementById('wordRecordBtn').innerText = "🎤 測發音";
  }

  function giveUpToDecision() { cp.money -= 10000; document.getElementById('step2Area').style.display = "none"; showDecisionStep(); }

  // --- 第三關：購買決策 ---
  function showDecisionStep() {
    document.getElementById('step3Area').style.display = "block";
    let listHtml = cp.list.map(it => `<div style="text-align:left; padding:4px; font-size:14px; border-bottom:1px solid #eee;">${cp.cart.includes(it) ? '✅' : '⬜'} ${it.zh} (${it.vi})</div>`).join('');
    document.getElementById('decisionMiniList').innerHTML = `<div style="font-weight:bold; margin-bottom:5px;">您的購物清單：</div>${listHtml}`;
  }

  // --- 第四關：櫃檯對話 ---
  function startDialogueFlow() {
      document.getElementById('step3Area').style.display = "none";
      document.getElementById('step4Area').style.display = "block";
      dialogueStep = 0; dialogueFailCount = 0;
      document.getElementById('clerkBubble').innerText = "Xin chào! Bạn muốn mua gì?";
      document.getElementById('playerBubble').style.display = "none";
      document.getElementById('targetSentence').innerText = `${currentItemObj.vi} bao nhiêu tiền?`;
      document.getElementById('dialogueRecordBtn').innerText = "🎤 點擊開始對話";
  }

  function processDialogue() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let rec = new SpeechRecognition(); rec.lang = 'vi-VN';
      rec.start(); document.getElementById('dialogueRecordBtn').innerText = "🎧 聆聽中...";
      rec.onresult = (e) => {
          let result = e.results[0][0].transcript.toLowerCase();
          document.getElementById('playerBubble').style.display = "block";
          document.getElementById('playerBubble').innerText = result;
          if (dialogueStep === 0 && (result.includes(currentItemObj.vi.toLowerCase()) || result.includes("bao nhiêu"))) {
              dialogueStep = 1; sfxCorrect.play();
              let priceMsg = `${currentItemObj.vi} ${currentItemObj.price.toLocaleString()} đồng.`;
              document.getElementById('clerkBubble').innerText = priceMsg;
              new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(priceMsg)}`).play();
              setTimeout(() => {
                document.getElementById('targetSentence').innerText = `Bán cho tôi ${currentItemObj.vi}`;
                document.getElementById('dialogueRecordBtn').innerText = "🎤 點擊並說出購買";
              }, 1500);
          } else if (dialogueStep === 1 && (result.includes("bán") || result.includes("cho tôi") || result.includes(currentItemObj.vi.toLowerCase()))) {
              sfxCorrect.play(); finalizePurchase();
          } else {
              sfxWrong.play(); dialogueFailCount++;
              if(dialogueFailCount >= 3) document.getElementById('giveupBtn').style.display = "inline-block";
          }
      };
      rec.onend = () => { document.getElementById('dialogueRecordBtn').innerText = (dialogueStep === 0 ? "🎤 點擊並說出問價" : "🎤 點擊並說出購買"); };
  }

  function finalizePurchase() { cp.money -= currentItemObj.price; cp.cart.push(currentItemObj); if(cp.list.includes(currentItemObj)) { sfxWow.play(); setTimeout(()=>sfxWow.pause(),1000); } endTurn(); }
  function giveUpToFinalize() { cp.money -= 10000; finalizePurchase(); }
  function endTurn() { document.getElementById('taskOverlay').style.display = "none"; currPlayerIdx = (currPlayerIdx + 1) % players.length; updateUI(); }

  const defaultColors = ["#e53935", "#1e88e5", "#43a047", "#fdd835", "#8e24aa", "#ff9800"];
  const defaultAvatars = ["👦", "👧", "👨", "👩", "👱‍♂️", "👱‍♀️"];
  window.onload = () => renderNameInputs();
</script>
</body>
